<main class="container">

<div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">

<div>

<h2>Equipamentos</h2>

<p>
Gerencie os equipamentos do usuário.
</p>

</div>

<button
class="btn-add"
id="btnAbrirFormulario">

Adicionar Equipamento

</button>

</div>

<!-- LISTA -->
<div
class="lista-equip"
id="listaEquipamentos">

</div>

<!-- FORM -->
<div
class="form-card"
id="cardFormulario">

<button
type="button"
class="btn-fechar-form"
id="btnFecharFormulario">

✕

</button>

<div class="form-header">

<h5 id="tituloFormulario">

Novo equipamento

</h5>

</div>

<div class="form-body">

<form id="formEquipUser">

<input
type="hidden"
id="equipUserId">

<div class="mb-4">

<label class="form-label">
Equipamento
</label>

<select
id="equipamento"
class="form-select"
required>

<option value="">
Selecione um equipamento
</option>

</select>

<div class="mt-3">

<button
type="button"
class="btn btn-outline-success"
data-bs-toggle="modal"
data-bs-target="#modalEquipamento">

+ Cadastrar novo equipamento

</button>

</div>

</div>

<div class="mb-4">

<label class="form-label">

Nome de identificação

</label>

<input
type="text"
id="nomeIdentificacao"
class="form-control"
required>

</div>

<div class="mb-4">

<label class="form-label">

Horas por dia

</label>

<input
type="number"
step="0.1"
id="horasPorDia"
class="form-control"
required>

</div>

<div class="preview mb-4">

<div class="preview-label">

Consumo esperado

</div>

<div class="preview-value">

<span id="consumoEsperado">

0.00

</span>

<small>kWh/dia</small>

</div>

</div>

<button
type="submit"
class="btn-save">

Salvar

</button>

</form>

</div>

</div>

</main>

<!-- MODAL -->
<div
class="modal fade"
id="modalEquipamento"
tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

Novo Equipamento

</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<form id="formNovoEquipamento">

<div class="mb-3">

<label class="form-label">
Nome
</label>

<input
type="text"
id="novoNome"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Modelo
</label>

<input
type="text"
id="novoModelo"
class="form-control">

</div>

<div class="mb-3">

<label class="form-label">
Consumo por hora
</label>

<input
type="number"
step="0.01"
id="novoConsumo"
class="form-control"
required>

</div>

</form>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-light"
data-bs-dismiss="modal">

Cancelar

</button>

<button
type="button"
class="btn btn-success"
id="btnSalvarEquipamento">

Salvar Equipamento

</button>

</div>

</div>

</div>

</div>
