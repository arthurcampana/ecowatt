    <meta charset="UTF-8">

    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/consumo.css">

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-header">

        <div class="container">

            <a class="navbar-brand" href="index.html">
                <img src="img/logo.png" class="logo" alt="Logo">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menuNavbar">

                <ul class="navbar-nav ms-auto align-items-lg-center">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Início
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="consumo.html">
                            Registrar Consumo
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="equipamento-usuario.html">
                            Equipamentos
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="relatorios.html">
                            Relatórios
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="metas.html">
                            Metas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="configuracoes.html">
                            Configurações
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="historico.html">
                            Histórico
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="perfil.html">
                            Perfil
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <main class="container content-wrap">

        <div class="page-header">

            <div>

                <h3>
                    Registrar Consumo
                </h3>

                <p>
                    Gerencie e acompanhe os registros de consumo energético.
                </p>

            </div>

            <button class="btn-add" id="btnAbrirFormulario">

                Adicionar Consumo

            </button>

        </div>

        <!-- FORM -->

        <div class="form-card" id="cardFormulario">

            <div class="form-card-header">

                <div class="d-flex justify-content-between align-items-center">

                    <h5 id="tituloFormulario">
                        Novo Consumo
                    </h5>

                    <button type="button" class="btn-close-custom" id="btnFecharFormulario">

                        ×

                    </button>

                </div>

            </div>

            <div class="form-card-body">

                <form id="formConsumo">

                    <input type="hidden" id="consumoId">

                    <div class="mb-4">

                        <label for="consumoKwh" class="form-label">

                            Consumo (kWh)

                        </label>

                        <input type="number" step="0.01" id="consumoKwh" class="form-control" placeholder="Ex.: 42.50"
                            required>

                        <div class="helper-text">
                            Informe o valor consumido.
                        </div>

                    </div>

                    <div class="mb-4">

                        <label for="dataRegistro" class="form-label">

                            Data

                        </label>

                        <input type="datetime-local" id="dataRegistro" class="form-control">

                    </div>

                    <button type="submit" class="btn-save">

                        Salvar Consumo

                    </button>

                </form>

            </div>

        </div>

        <!-- HISTÓRICO -->

        <div class="historico-title">

            <h4>
                Histórico de Consumos
            </h4>

        </div>

        <div class="lista-consumos" id="listaConsumos">

        </div>

    </main>

    <script src="js/consumo.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>

</body>

</html>
