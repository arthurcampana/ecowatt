<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Consumo Consciente</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    body {
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .register-card {
      padding: 3rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
    }

    .logo {
      display: block;
      margin: 0 auto 2rem auto;
      max-width: 180px;
    }

    .register-card h4 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      text-align: center;
      font-weight: bold;
    }

    .form-control {
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
      padding: 0.8rem;
    }

    .btn-primary {
      width: 100%;
      font-size: 1.2rem;
      padding: 0.8rem;
    }

    .text-center a {
      text-decoration: none;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="register-card">
    <img src="img/logo.png" alt="Logo" class="logo">
    <h4>Cadastro</h4>
    <form id="cadastroForm">
      <input type="text" id="nome" class="form-control" placeholder="Nome completo" required>
      <input type="email" id="email" class="form-control" placeholder="Email" required>
      <input type="password" id="senha" class="form-control" placeholder="Senha" required>
      <input type="password" id="confirmarSenha" class="form-control" placeholder="Confirmar Senha" required>
      <button type="submit" class="btn btn-primary">Cadastrar</button>
    </form>
    <p class="text-center mt-3">Já tem conta? <a href="login.html">Entrar</a></p>
  </div>

  <script>

    
    const form = document.getElementById('cadastroForm');

    form.addEventListener('submit', async function(event) {
    // Impede a página de recarregar
      event.preventDefault();

    // Coleta os valores
      const dados = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value,
        confirmacao: document.getElementById('confirmarSenha').value
      };

    // Validação básica de exemplo
      if (dados.senha !== dados.confirmacao) {
        alert("As senhas não coincidem!");
        return;
      }

      try {
      const response = await fetch('https://localhost8080/usuario/add', {
        method: 'POST', // Define que você está enviando dados
        headers: {
          'Content-Type': 'application/json' // Avisa o servidor que o corpo é um JSON
        },
        body: JSON.stringify(dados) // Transforma o objeto JS em texto JSON
      });

      if (response.ok) {
        const resultado = await response.json();
        alert("Usuário cadastrado com sucesso!");
        window.location.href = "login.html"; // Redireciona após o sucesso
      } else {
        const erro = await response.json();
        alert("Erro no servidor: " + erro.mensagem);
      }
    } catch (error) {
      console.error("Erro na requisição:", error);
      alert("Não foi possível conectar ao servidor.");
    }
    });
  </script>

</body>
</html>
